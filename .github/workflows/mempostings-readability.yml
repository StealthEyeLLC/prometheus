name: Temporary MemPostings readability runner

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  rewrite:
    if: github.event.pull_request.head.ref == 'mempostings-readability-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tsdb-mempostings-phase-shards
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Rewrite synchronization code
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          gate = '''// Copyright The Prometheus Authors
          // Licensed under the Apache License, Version 2.0 (the "License");
          // you may not use this file except in compliance with the License.
          // You may obtain a copy of the License at
          //
          // http://www.apache.org/licenses/LICENSE-2.0
          //
          // Unless required by applicable law or agreed to in writing, software
          // distributed under the License is distributed on an "AS IS" BASIS,
          // WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          // See the License for the specific language governing permissions and
          // limitations under the License.

          package index

          import (
          \t"sync"
          \t"time"
          )

          type postingsGateMode uint8

          const (
          \tpostingsIdle postingsGateMode = iota
          \tpostingsAdding
          \tpostingsReading
          \tpostingsExclusive
          )

          // postingsGate allows concurrent adds or concurrent reads, but never both.
          // Delete and EnsureOrder run alone. Waiting readers stop new adds, and a
          // waiting exclusive operation stops both.
          type postingsGate struct {
          \tmu               sync.Mutex
          \tcond             *sync.Cond
          \tmode             postingsGateMode
          \tactive           int
          \twaitingReaders   int
          \twaitingExclusive int
          }

          func (g *postingsGate) init() {
          \tg.cond = sync.NewCond(&g.mu)
          }

          func (g *postingsGate) enterAdd() {
          \tg.mu.Lock()
          \tdefer g.mu.Unlock()
          \tfor g.mode == postingsReading || g.mode == postingsExclusive || g.waitingReaders > 0 || g.waitingExclusive > 0 {
          \t\tg.cond.Wait()
          \t}
          \tg.mode = postingsAdding
          \tg.active++
          }

          func (g *postingsGate) leaveAdd() {
          \tg.mu.Lock()
          \tg.active--
          \tif g.active == 0 {
          \t\tg.mode = postingsIdle
          \t\tg.cond.Broadcast()
          \t}
          \tg.mu.Unlock()
          }

          func (g *postingsGate) enterRead() {
          \tg.mu.Lock()
          \tdefer g.mu.Unlock()
          \tg.waitingReaders++
          \tdefer func() { g.waitingReaders-- }()
          \tfor g.mode == postingsAdding || g.mode == postingsExclusive || g.waitingExclusive > 0 {
          \t\tg.cond.Wait()
          \t}
          \tg.mode = postingsReading
          \tg.active++
          }

          func (g *postingsGate) leaveRead() {
          \tg.mu.Lock()
          \tg.active--
          \tif g.active == 0 {
          \t\tg.mode = postingsIdle
          \t\tg.cond.Broadcast()
          \t}
          \tg.mu.Unlock()
          }

          func (g *postingsGate) enterExclusive() {
          \tg.mu.Lock()
          \tdefer g.mu.Unlock()
          \tg.waitingExclusive++
          \tdefer func() { g.waitingExclusive-- }()
          \tfor g.mode != postingsIdle {
          \t\tg.cond.Wait()
          \t}
          \tg.mode = postingsExclusive
          }

          func (g *postingsGate) leaveExclusive() {
          \tg.mu.Lock()
          \tg.mode = postingsIdle
          \tg.cond.Broadcast()
          \tg.mu.Unlock()
          }

          func (g *postingsGate) yieldExclusive() {
          \tg.leaveExclusive()
          \ttime.Sleep(time.Millisecond)
          \tg.enterExclusive()
          }
          '''
          gate = '\n'.join(line[10:] if line.startswith('          ') else line for line in gate.splitlines()) + '\n'
          Path('tsdb/index/postings_gate.go').write_text(gate)

          path = Path('tsdb/index/postings.go')
          s = path.read_text()
          start = s.index('// postingsPhaseGate separates')
          end = s.index('const memPostingsShardCount = 256')
          s = s[:start] + s[end:]
          s = s.replace('\t"time"\n', '')
          s = s.replace('gate postingsPhaseGate', 'gate postingsGate')
          replacements = {
              '.gate.beginAdd()': '.gate.enterAdd()',
              '.gate.endAdd()': '.gate.leaveAdd()',
              '.gate.beginRead()': '.gate.enterRead()',
              '.gate.endRead()': '.gate.leaveRead()',
              '.gate.beginExclusive()': '.gate.enterExclusive()',
              '.gate.endExclusive()': '.gate.leaveExclusive()',
          }
          for old, new in replacements.items():
              s = s.replace(old, new)
          s = s.replace('// shards holds the postings lists for each label-value pair.\n', '')
          s = s.replace('// lvs holds all known values for each label name. It lets label-value\n\t// queries avoid scanning every shard to discover values. Add updates lvs\n\t// while readers are excluded by the phase gate.\n', '// lvs indexes known values by label name.\n')
          s = s.replace('// enableSharding moves replay-built postings into the live shards without\n// copying the postings lists. The caller must hold the exclusive phase.\n', '// enableSharding moves replay-built postings into the live shards.\n')
          s = s.replace('// From time to time we want some readers to go through and read their postings.\n', '// Let blocked operations run between batches.\n')
          s = s.replace('// Add a label set to the postings index. The whole label set, including the\n// all-postings entry, is published in one Add phase. This keeps readers from\n// observing a series through one label matcher but not another matcher from the\n// same label set.\n', '// Add inserts a series into every postings list before allowing reads to continue.\n')
          s = s.replace('// postingsForLabelValues assumes the caller is in a read phase. Shard locks\n// protect shard-local postings, and the read phase protects the cross-shard\n// snapshot from overlapping a multi-label Add.\n', '')
          s = s.replace('// postingsForAllLabelValues assumes the caller is in a read phase. Shard locks\n// protect shard-local postings, and the read phase protects the cross-shard\n// snapshot from overlapping a multi-label Add.\n', '')
          s = s.replace('// postingsForAllLabelValuesIfUnchanged enters a read phase and verifies that\n// the label-value slice captured before matching is still current before reading\n// postings for all values.\n', '// postingsForAllLabelValuesIfUnchanged uses the fast path only if the value index is unchanged.\n')
          s = s.replace('// Let the mutex go before merging.\n', '// Merge after releasing read access.\n')
          path.write_text(s)

          test = Path('tsdb/index/postings_phase_gate_test.go')
          s = test.read_text()
          s = s.replace('postingsPhaseGate', 'postingsGate')
          s = s.replace('beginAdd', 'enterAdd').replace('endAdd', 'leaveAdd')
          s = s.replace('beginRead', 'enterRead').replace('endRead', 'leaveRead')
          s = s.replace('readWaiters', 'waitingReaders')
          s = s.replace('.mtx', '.mu')
          s = s.replace('// Start the second Add before releasing the first one.\n', '')
          test.write_text(s)
          PY
          gofmt -w tsdb/index/postings.go tsdb/index/postings_gate.go tsdb/index/postings_phase_gate_test.go
          git diff --check
      - name: Test index
        shell: bash
        run: |
          go test ./tsdb/index > /tmp/index.log 2>&1 || { tail -n 120 /tmp/index.log; exit 1; }
      - name: Test TSDB
        shell: bash
        run: |
          go test ./tsdb/... > /tmp/tsdb.log 2>&1 || { tail -n 120 /tmp/tsdb.log; exit 1; }
      - name: Commit
        shell: bash
        run: |
          git config user.name 'StealthEyeLLC'
          git config user.email '247854506+StealthEyeLLC@users.noreply.github.com'
          git add tsdb/index/postings.go tsdb/index/postings_gate.go tsdb/index/postings_phase_gate_test.go
          git commit -s -m 'tsdb: simplify MemPostings synchronization'
          git push origin HEAD:tsdb-mempostings-phase-shards
