name: Temporary MemPostings final builder

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.head.ref == 'mempostings-finalize-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mempostings-readability-candidate-1
          fetch-depth: 0
          show-progress: false
          token: ${{ github.token }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Finish readability pass
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          gate = Path('tsdb/index/postings_gate.go')
          text = gate.read_text()
          text = text.replace('\tactive           int\n', '\tactiveCount      int // adds or reads in the current mode\n')
          text = text.replace('g.active', 'g.activeCount')
          gate.write_text(text)

          postings = Path('tsdb/index/postings.go')
          text = postings.read_text()
          text = text.replace('sameStringSliceData', 'sameStringSliceBackingArray')
          text = text.replace('// postingsForAllLabelValuesIfUnchanged uses the fast path only if the value index is unchanged.\n', '')
          text = text.replace('\t// Merge after releasing read access.\n', '')
          postings.write_text(text)
          PY
          git mv tsdb/index/postings_phase_gate_test.go tsdb/index/postings_gate_test.go
          gofmt -w tsdb/index/postings.go tsdb/index/postings_gate.go tsdb/index/postings_gate_test.go tsdb/index/postings_test.go
          git diff --check
      - name: Create final commit
        shell: bash
        run: |
          git config user.name 'StealthEyeLLC'
          git config user.email '247854506+StealthEyeLLC@users.noreply.github.com'
          git reset --soft c01ac96a3cf9e1be2374de8e0618fecf7ea17ffc
          git add -A
          git commit -s -m 'tsdb: simplify MemPostings synchronization'
          test "$(git rev-list --count c01ac96a3cf9e1be2374de8e0618fecf7ea17ffc..HEAD)" = 1
      - name: Test gate
        run: go test ./tsdb/index -run '^TestMemPostingsReadWaiterBlocksNewAdds$'
      - name: Test index
        run: go test ./tsdb/index
      - name: Test TSDB
        run: go test ./tsdb/...
      - name: Push final branch
        run: git push origin HEAD:mempostings-readability-final
