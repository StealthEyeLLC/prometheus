name: Temporary MemPostings candidate diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'mempostings-readability-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mempostings-readability-candidate-1
          fetch-depth: 1
          show-progress: false
          token: ${{ github.token }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run diagnostic
        shell: bash
        run: |
          set +e
          go test ./tsdb/index -run '^TestMemPostingsReadWaiterBlocksNewAdds$' -v > mempostings-diagnostic.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> mempostings-diagnostic.txt
          git config user.name 'StealthEyeLLC'
          git config user.email '247854506+StealthEyeLLC@users.noreply.github.com'
          git add mempostings-diagnostic.txt
          git commit -s -m 'test: record MemPostings readability diagnostic'
          git push origin HEAD:mempostings-readability-diagnostic-1
