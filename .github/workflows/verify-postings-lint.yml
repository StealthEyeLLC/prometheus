name: Diagnose MemPostings normal test

on:
  pull_request:
    branches:
      - tsdb-mempostings-lint-base

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.x
      - name: Run one focused test pass
        run: |
          git clone -q --depth=1 --branch tsdb-mempostings-correctness-fix https://github.com/StealthEyeLLC/prometheus.git repo
          cd repo
          set +e
          go test ./tsdb ./tsdb/index -run 'TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings|TestMemPostingsOutOfOrderAddDoesNotChangeExistingIterator|TestMemPostingsReadWaiterBlocksNewAdds|TestMemPostingsPartialLabelSetVisibility' -count=1 -timeout=2m >test.log 2>&1
          status=$?
          tail -n 120 test.log
          exit $status
