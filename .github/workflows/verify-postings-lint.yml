name: Verify MemPostings correctness fix

on:
  pull_request:
    branches:
      - tsdb-mempostings-lint-base

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Clone correctness branch
        run: |
          export PATH=/opt/hostedtoolcache/go/1.26.4/x64/bin:$PATH
          git clone -q --depth=1 --branch tsdb-mempostings-correctness-fix https://github.com/StealthEyeLLC/prometheus.git repo
      - name: Run lint
        working-directory: repo
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /tmp v2.11.4 >/dev/null
          /tmp/golangci-lint run ./tsdb/... --timeout=4m
      - name: Run targeted test
        working-directory: repo
        run: go test ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=20
      - name: Run race test
        working-directory: repo
        run: go test -race ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=5
      - name: Run 32-bit test
        working-directory: repo
        run: GOARCH=386 go test ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=5
      - name: Run dedupelabels test
        working-directory: repo
        run: go test --tags=dedupelabels ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=5
