name: Repair matcher snapshot hook

on:
  pull_request:
    branches:
      - tsdb-mempostings-lint-base

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: tsdb-mempostings-correctness-fix
          fetch-depth: 0
      - name: Restore and patch querier
        run: |
          git checkout e06a615c5befd790cf5579369359c185ff8a2a73 -- tsdb/querier.go
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tsdb/querier.go")
          text = path.read_text()
          old = '''func PostingsForMatchers(ctx context.Context, ix IndexReader, ms ...*labels.Matcher) (index.Postings, error) {
\tif len(ms) == 1 && ms[0].Name == "" && ms[0].Value == "" {
'''
          new = '''func PostingsForMatchers(ctx context.Context, ix IndexReader, ms ...*labels.Matcher) (index.Postings, error) {
\tif snapshotter, ok := ix.(postingsForMatchersSnapshotter); ok {
\t\tix = snapshotter.postingsForMatchersSnapshot(ms)
\t}

\tif len(ms) == 1 && ms[0].Name == "" && ms[0].Value == "" {
'''
          if text.count(old) != 1:
              raise SystemExit(f"expected one PostingsForMatchers opening, found {text.count(old)}")
          path.write_text(text.replace(old, new))
          PY
          gofmt -w tsdb/querier.go
          git diff --check
      - name: Commit and push
        run: |
          git config user.name StealthEyeLLC
          git config user.email 247854506+StealthEyeLLC@users.noreply.github.com
          git add tsdb/querier.go
          git commit -m "tsdb: restore querier and add snapshot hook" -m "Signed-off-by: StealthEyeLLC <247854506+StealthEyeLLC@users.noreply.github.com>"
          git push origin HEAD:tsdb-mempostings-correctness-fix
