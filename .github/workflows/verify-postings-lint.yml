name: Verify remaining postings failure

on:
  pull_request:
    branches:
      - tsdb-mempostings-lint-base

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Run targeted test
        run: |
          export PATH=/opt/hostedtoolcache/go/1.26.4/x64/bin:$PATH
          git clone -q --depth=1 --branch tsdb-mempostings-correctness-fix https://github.com/StealthEyeLLC/prometheus.git repo
          cd repo
          set +e
          go test ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=10 >test.log 2>&1
          status=$?
          tail -n 80 test.log
          exit $status
