name: Diagnose Head postings error

on:
  pull_request:
    branches:
      - tsdb-mempostings-lint-base

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Clone correctness branch
        run: git clone -q --depth=1 --branch tsdb-mempostings-correctness-fix https://github.com/StealthEyeLLC/prometheus.git repo
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.x
          cache-dependency-path: repo/go.sum
      - name: Run Head test
        run: |
          cd repo
          set +e
          go test ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=1 -timeout=2m >test.log 2>&1
          status=$?
          grep -E 'FAIL:|Error Trace:|Error:|Test:|series [0-9]+|panic: test timed out' test.log || true
          exit $status
