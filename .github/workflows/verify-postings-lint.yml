name: Verify MemPostings correctness branch

on:
  pull_request:
    branches:
      - tsdb-mempostings-lint-base

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.x
      - name: Clone correctness branch
        run: git clone -q --depth=1 --branch tsdb-mempostings-correctness-fix https://github.com/StealthEyeLLC/prometheus.git repo
      - name: Check format
        working-directory: repo
        run: |
          test -z "$(gofmt -d tsdb/index/postings.go tsdb/index/postings_iterator_test.go tsdb/index/postings_snapshot.go tsdb/postings_snapshot.go tsdb/querier.go tsdb/head_postings_concurrency_test.go)"
          git diff --check
      - name: Run lint
        working-directory: repo
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /tmp v2.11.4 >/dev/null
          /tmp/golangci-lint run ./tsdb/... --timeout=4m
      - name: Run focused tests
        working-directory: repo
        run: go test ./tsdb ./tsdb/index -run 'TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings|TestMemPostingsOutOfOrderAddDoesNotChangeExistingIterator|TestMemPostingsReadWaiterBlocksNewAdds|TestMemPostingsPartialLabelSetVisibility' -count=20
      - name: Run race tests
        working-directory: repo
        run: go test -race ./tsdb ./tsdb/index -run 'TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings|TestMemPostingsOutOfOrderAddDoesNotChangeExistingIterator|TestMemPostingsReadWaiterBlocksNewAdds|TestMemPostingsPartialLabelSetVisibility' -count=5
      - name: Run 32-bit tests
        working-directory: repo
        run: GOARCH=386 go test ./tsdb ./tsdb/index -run 'TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings|TestMemPostingsOutOfOrderAddDoesNotChangeExistingIterator|TestMemPostingsReadWaiterBlocksNewAdds|TestMemPostingsPartialLabelSetVisibility' -count=5
      - name: Run dedupelabels tests
        working-directory: repo
        run: go test --tags=dedupelabels ./tsdb ./tsdb/index -run 'TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings|TestMemPostingsOutOfOrderAddDoesNotChangeExistingIterator|TestMemPostingsReadWaiterBlocksNewAdds|TestMemPostingsPartialLabelSetVisibility' -count=5
