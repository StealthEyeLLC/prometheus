name: Verify postings follow-up

on:
  pull_request:
    branches:
      - tsdb-mempostings-lint-base

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.x
      - name: Clone live branch
        run: git clone -q --depth=1 --branch tsdb-mempostings-phase-shards https://github.com/StealthEyeLLC/prometheus.git repo
      - name: Run lint
        working-directory: repo
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /tmp v2.11.4 >/dev/null
          /tmp/golangci-lint run ./tsdb/... --timeout=4m
      - name: Run targeted test
        working-directory: repo
        run: go test ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=10
      - name: Run 32-bit targeted test
        working-directory: repo
        run: GOARCH=386 go test ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=3
      - name: Run dedupelabels targeted test
        working-directory: repo
        run: go test --tags=dedupelabels ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=3
