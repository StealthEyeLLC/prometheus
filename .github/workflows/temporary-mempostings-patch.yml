name: Temporary MemPostings patch runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'tsdb-mempostings-main-patch-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: tsdb-mempostings-live-path-fix
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.x
          cache-dependency-path: go.sum
      - name: Apply live-path fixes
        run: |
          git fetch origin tsdb-mempostings-patch-runner-v2
          git show origin/tsdb-mempostings-patch-runner-v2:.github/workflows/patch-mempostings-live-path.yml > /tmp/patch-workflow.yml
          python3 - <<'PYEXTRACT'
          from pathlib import Path

          text = Path('/tmp/patch-workflow.yml').read_text()
          start = "          python3 - <<'PY'\n"
          end = "\n          PY\n"
          if text.count(start) != 1 or text.count(end) != 1:
              raise SystemExit('unable to locate patch script')
          script = text.split(start, 1)[1].split(end, 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in script.splitlines())
          exec(compile(script, 'mempostings-patch.py', 'exec'))
          PYEXTRACT
          gofmt -w tsdb/index/postings.go tsdb/index/postings_test.go tsdb/index/postings_iterator_test.go tsdb/head_postings_concurrency_test.go
          git diff --check
      - name: Run focused tests
        run: |
          go test ./tsdb/index -run 'TestMemPostings_(addFor|ensureOrder)|TestMemPostingsOutOfOrderAddDoesNotChangeExistingIterator|TestMemPostingsReadWaiterBlocksNewAdds|TestMemPostingsPartialLabelSetVisibility' -count=1
          go test ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=1 -timeout=2m
      - name: Commit and push
        run: |
          git config user.name StealthEyeLLC
          git config user.email 247854506+StealthEyeLLC@users.noreply.github.com
          git add tsdb/index/postings.go tsdb/index/postings_test.go tsdb/index/postings_iterator_test.go tsdb/head_postings_concurrency_test.go
          git commit -m "tsdb: activate sharded postings after replay" -m "Signed-off-by: StealthEyeLLC <247854506+StealthEyeLLC@users.noreply.github.com>"
          git push origin HEAD:tsdb-mempostings-live-path-fix
