name: Verify postings follow-up

on:
  push:
    branches:
      - tsdb-mempostings-local-verify

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.x
      - name: Check format
        run: |
          diff=$(gofmt -d tsdb/head_postings_concurrency_test.go)
          if [ -n "$diff" ]; then
            printf '%s\n' "$diff"
            exit 1
          fi
      - name: Run targeted test
        run: go test ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=10
      - name: Run targeted race test
        run: go test -race ./tsdb -run '^TestHeadConcurrentSeriesCreationDoesNotExposePartialPostings$' -count=3
