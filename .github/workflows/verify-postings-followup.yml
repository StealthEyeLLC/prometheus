name: Verify postings follow-up

on:
  pull_request:
    branches:
      - tsdb-mempostings-verify-base

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check format
        run: |
          git clone -q --depth=1 --branch tsdb-mempostings-phase-shards https://github.com/StealthEyeLLC/prometheus.git repo
          cd repo
          gofmt -d tsdb/head_postings_concurrency_test.go
          test -z "$(gofmt -d tsdb/head_postings_concurrency_test.go)"
